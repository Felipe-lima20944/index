{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beatflow · Nova senha</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans&display=swap">
    <style>body{background:#07070a;color:#f0f0f4;font-family:'DM Sans',sans-serif;} .container{max-width:400px;margin:100px auto;padding:40px;background:#0f0a1e;border-radius:8px;} .btn-primary{background:#8b2cf6;color:#fff;padding:10px 20px;border:none;border-radius:4px;cursor:pointer;}</style>
</head>
<body>
<div class="container">
  <h2>Defina sua nova senha</h2>
  <form method="post">{% csrf_token %}
    {{ form.as_p }}
    <button class="btn-primary" type="submit">Salvar</button>
  </form>
  <p style="margin-top:20px;"><a href="/accounts/login/" style="color:#8b2cf6;">Voltar ao login</a></p>
</div>
</body>
</html>
