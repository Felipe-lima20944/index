{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Beatflow · Recuperar Senha</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=Clash+Display:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* basic reset and colors reused from login page */
        body { background: #07070a; color: #f0f0f4; font-family: 'DM Sans', sans-serif; }
        .split-layout { display:flex; align-items:center; justify-content:center; min-height:100vh; }
        .panel-login { width:100%; max-width:400px; padding:40px; background:#0f0a1e; border-radius:8px; }
        .panel-login h2 { margin-bottom:20px; }
        .field { margin-bottom:15px; }
        .btn-primary { background: #8b2cf6; color:#fff; padding:10px 20px; border:none; border-radius:4px; cursor:pointer; }
        .btn-primary:hover { opacity:0.9; }
    </style>
</head>
<body>
<div class="split-layout">
    <div class="panel-login">
        <h2>Esqueceu sua senha?</h2>
        <p>Informe seu e-mail e enviaremos instruções para redefinir.</p>
        <form method="post">{% csrf_token %}
          <div class="field">
            <label for="id_email">E-mail</label>
            <input type="email" name="email" id="id_email" required style="width:100%; padding:8px; border-radius:4px;">
          </div>
          <button class="btn-primary" type="submit">Enviar</button>
        </form>
        <p style="margin-top:20px;"><a href="/accounts/login/" style="color:#8b2cf6;">Voltar ao login</a></p>
    </div>
</div>
</body>
</html>
